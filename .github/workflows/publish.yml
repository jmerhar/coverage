name: Publish coverage site

# Rebuilds and deploys the site whenever a source project pushes a new report (reports/**), or when
# the generator/workflow itself changes. Deploys via the GitHub Actions Pages pipeline (no branch).
on:
  push:
    branches: [main]
    paths:
      - 'reports/**'
      - 'bin/build-site.py'
      - '.github/workflows/publish.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let queued source pushes coalesce; never cancel an in-flight deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      # Generate the index/cross-link pages in-place under reports/ (not committed).
      - run: python3 bin/build-site.py reports
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: reports
      - id: deployment
        uses: actions/deploy-pages@v4
